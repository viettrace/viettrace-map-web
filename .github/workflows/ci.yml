name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Lint and build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_TILE_URL_PRE: https://tiles.viettrace.org/tiles/vn_provinces_pre_2025
          NEXT_PUBLIC_TILE_URL_POST: https://tiles.viettrace.org/tiles/vn_provinces_post_2025
          NEXT_PUBLIC_TILE_URL_ISLANDS: https://tiles.viettrace.org/tiles/vn_offshore_islands
          NEXT_PUBLIC_MAP_STYLE: https://basemaps.cartocdn.com/gl/positron-gl-style/style.json
          NEXT_PUBLIC_SITE_URL: https://viettrace.org
          NEXT_PUBLIC_SENTRY_ENABLED: "false"

      # `pnpm build` regenerates the committed basemap style (generate-omt-basemap-style.mjs).
      # If the result differs from what is committed, the style files are stale — fail here with a
      # clear message instead of letting it surface later as a dirty-working-dir error in Release.
      - name: Verify generated basemap style is up to date
        run: |
          if ! git diff --quiet -- public/omt-basemap-style.json public/omt-basemap-style-en.json; then
            echo "::error::Generated basemap style is out of date. Run 'pnpm basemap:generate-omt-style' and commit public/omt-basemap-style*.json."
            git --no-pager diff -- public/omt-basemap-style.json public/omt-basemap-style-en.json
            exit 1
          fi
