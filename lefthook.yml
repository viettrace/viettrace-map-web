pre-commit:
  parallel: true
  commands:
    lint-staged:
      # Use project devDependency (avoid pnpm dlx cache / version skew)
      run: pnpm exec lint-staged
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      # Use @commitlint/cli from devDependencies (dlx can break with incomplete dlx store)
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    knip:
      run: pnpm knip:production
